<!DOCTYPE html>
<html>

<head>
    <title>Password Strength Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Password Analyzer</h1>

        <p>
            Check how strong your password is.
        </p>

        <input 
            type="password" 
            id="password"
            placeholder="Enter password"
        >

        <button id="checkBtn">
            Check Password
        </button>


        <h2 id="result">
            Strength: 
        </h2>

        <p id="entropy">
    Entropy: -
</p>

<p id="crackTime">
    Estimated Crack Time: -
</p>
<p id="breachStatus">
    Breach Check: -
</p>
<div id="warnings"></div>


        <div class="checks">

            <p id="length">
                ❌ At least 8 characters
            </p>

            <p id="upper">
                ❌ Contains uppercase letter
            </p>

            <p id="number">
                ❌ Contains a number
            </p>

            <p id="symbol">
                ❌ Contains special character
            </p>

        </div>


    </div>


<script src="script.js"></script>

</body>

</html>
